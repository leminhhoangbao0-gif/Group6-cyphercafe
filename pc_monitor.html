<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PC Monitoring</title>

    <link rel="stylesheet"
          href="pc_monitor.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>Cyber Cafe</h2>

        <ul>

            <li onclick="location.href='admin_dashboard.html'">
                Dashboard
            </li>

            <li onclick="location.href='customer_management.html'">
                Customers
            </li>

            <li class="active">
                PC Monitor
            </li>

            <li onclick="location.href='report.html'">
                Reports
            </li>

            <li onclick="logout()">🚪 Logout</li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <h1>PC Monitoring</h1>

        <!-- Summary -->

        <div class="summary">

            <div class="card">
                <h3>Total PCs</h3>
                <h2 id="totalPC">0</h2>
            </div>

            <div class="card">
                <h3>Available</h3>
                <h2 id="availablePC">0</h2>
            </div>

            <div class="card">
                <h3>Busy</h3>
                <h2 id="busyPC">0</h2>
            </div>

            <div class="card">
                <h3>Offline</h3>
                <h2 id="offlinePC">0</h2>
            </div>

        </div>

        <!-- Search -->

        <div class="toolbar">

            <input
                type="text"
                id="searchInput"
                placeholder="Search PC...">

            <button onclick="searchPC()">
                Search
            </button>

            <button onclick="loadPCs()">
                Refresh
            </button>

        </div>

        <!-- Table -->

        <table>

            <thead>

            <tr>

                <th>ID</th>

                <th>PC Name</th>

                <th>Status</th>

                <th>User</th>

                <th>Session Time</th>

            </tr>

            </thead>

            <tbody id="pcTable">

            </tbody>

        </table>

    </main>

</div>

<script src="pc_monitor.js"></script>

</body>
</html>
