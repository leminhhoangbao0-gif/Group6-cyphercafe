<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Customer Management</title>

    <link rel="stylesheet"
          href="customer_management.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>Cyber Cafe</h2>

        <ul>

            <li onclick="location.href='admin_dashboard.html'">
                Dashboard
            </li>

            <li class="active">
                Customers
            </li>

            <li onclick="location.href='pc_monitor.html'">
                PC Monitor
            </li>

            <li onclick="location.href='report.html'">
                Reports
            </li>

            <li onclick="logout()">🚪 Logout</li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <header>

            <h1>Customer Management</h1>

        </header>

        <!-- Toolbar -->

        <div class="toolbar">

            <input
                type="text"
                id="searchInput"
                placeholder="Search customer..."
            >

            <button onclick="searchCustomer()">
                Search
            </button>

            <button onclick="loadCustomers()">
                Refresh
            </button>

            <button onclick="addCustomer()">
                Add Customer
            </button>

        </div>

        <!-- Table -->

        <table>

            <thead>

            <tr>

                <th>ID</th>

                <th>Username</th>

                <th>Full Name</th>

                <th>Balance</th>

                <th>Status</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody id="customerTable">

            </tbody>

        </table>

    </main>

</div>

<script src="customer_management.js"></script>

</body>

</html>
