<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reports</title>

    <link rel="stylesheet"
          href="report.css">

    <!-- Chart.js -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>Cyber Cafe</h2>

        <ul>

            <li onclick="location.href='admin_dashboard.html'">
                Dashboard
            </li>

            <li onclick="location.href='customer_management.html'">
                Customers
            </li>

            <li onclick="location.href='pc_monitor.html'">
                PC Monitor
            </li>

            <li class="active">
                Reports
            </li>

            <li onclick="logout()">🚪 Logout</li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <h1>Revenue Reports</h1>

        <!-- Cards -->

        <div class="cards">

            <div class="card">

                <h3>Today's Revenue</h3>

                <h2 id="todayRevenue">0 VNĐ</h2>

            </div>

            <div class="card">

                <h3>Monthly Revenue</h3>

                <h2 id="monthRevenue">0 VNĐ</h2>

            </div>

            <div class="card">

                <h3>Total Sessions</h3>

                <h2 id="sessions">0</h2>

            </div>

            <div class="card">

                <h3>Active Customers</h3>

                <h2 id="customers">0</h2>

            </div>

        </div>

        <!-- Chart -->

        <div class="chartBox">

            <canvas id="revenueChart"></canvas>

        </div>

        <!-- Tables -->

        <div class="tables">

            <div class="tableBox">

                <h2>Top Customers</h2>

                <table>

                    <thead>

                    <tr>

                        <th>Username</th>

                        <th>Spent</th>

                    </tr>

                    </thead>

                    <tbody id="topCustomer">

                    </tbody>

                </table>

            </div>

            <div class="tableBox">

                <h2>Top PCs</h2>

                <table>

                    <thead>

                    <tr>

                        <th>PC</th>

                        <th>Hours</th>

                    </tr>

                    </thead>

                    <tbody id="topPC">

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

<script src="report.js"></script>

</body>

</html>
